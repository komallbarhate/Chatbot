<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NovaMind – AI chatbot with conversation history, file sharing, incognito mode and search." />
  <title>NovaMind – AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 4h3.5l6.5 9.5V4H17v14h-3.5L7 8.5V18H4V4z" fill="#000"/>
            </svg>
          </div>
          <span class="logo-text">NovaMind</span>
        </div>
        <div class="online-badge">
          <span class="pulse-dot"></span>
          Online
        </div>
        <div class="sidebar-action-btns">
          <button class="new-chat-btn" id="clear-btn" title="New chat">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New chat
          </button>
          <button class="incognito-sidebar-btn" id="incognito-sidebar-btn" title="Incognito mode">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="sidebar-search">
        <div class="search-wrapper">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search chats…" autocomplete="off" spellcheck="false"/>
          <button class="search-clear-btn" id="search-clear-btn" title="Clear search">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Scrollable content: history + topics -->
      <div class="sidebar-content">

        <!-- History -->
        <div class="sidebar-history-section">
          <p class="section-label">History</p>
          <div class="session-list" id="session-list">
            <p class="no-sessions">No history yet</p>
          </div>
        </div>

        <!-- Topics -->
        <div class="sidebar-section">
          <p class="section-label">Explore topics</p>
          <div class="topic-chips">
            <button class="chip" data-msg="Hello!" id="chip-hello">👋 Greetings</button>
            <button class="chip" data-msg="What's the weather like?" id="chip-weather">🌤 Weather</button>
            <button class="chip" data-msg="Tell me a joke" id="chip-joke">😂 Jokes</button>
            <button class="chip" data-msg="What time is it?" id="chip-time">🕐 Time &amp; Date</button>
            <button class="chip" data-msg="What can you do?" id="chip-help">🤖 Capabilities</button>
            <button class="chip" data-msg="Give me a fun fact" id="chip-fact">💡 Fun Facts</button>
            <button class="chip" data-msg="How are you?" id="chip-howru">😊 Mood Check</button>
            <button class="chip" data-msg="Tell me a quote" id="chip-quote">✨ Quotes</button>
            <button class="chip" data-msg="What is AI?" id="chip-ai">🧠 About AI</button>
            <button class="chip" data-msg="Bye!" id="chip-bye">👋 Goodbye</button>
          </div>
        </div>

      </div>

      <div class="sidebar-footer">
        <div class="stats-row">
          <div class="stat-card">
            <span class="stat-value" id="msg-count">0</span>
            <span class="stat-label">Messages</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="session-time">00:00</span>
            <span class="stat-label">Session</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Chat Area ── -->
    <main class="chat-area">

      <!-- Chat Header -->
      <header class="chat-header">
        <div class="bot-info">
          <div class="bot-avatar-header">
            <span>N</span>
            <span class="status-ring"></span>
          </div>
          <div>
            <h1 class="bot-name">NovaMind</h1>
            <p class="bot-status" id="bot-status-text"></p>
          </div>
        </div>
        <div class="header-actions">
          <div class="ml-status-badge" id="ml-status-badge" style="display:none">
            <span class="ml-dot ml-dot--loading" id="ml-dot"></span>
            <span id="ml-status-text"></span>
          </div>
          <button class="icon-btn" id="incognito-header-btn" title="Incognito Mode">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
          <button class="icon-btn nlp-view-btn active" id="nlp-view-toggle" title="Toggle Info Panels">⬡</button>
          <button class="icon-btn" id="theme-toggle" title="Toggle Theme">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Incognito Banner -->
      <div class="incognito-banner" id="incognito-banner">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        Incognito mode — this conversation won't be saved
      </div>

      <!-- Messages -->
      <div class="messages-container" id="messages">
        <div class="copilot-hero" id="copilot-hero">
          <div class="copilot-hero-icon">N</div>
          <h2 class="copilot-hero-title">Hi, I'm NovaMind</h2>
          <p class="copilot-hero-sub">Your AI assistant. Ask me anything.</p>
        </div>
        <div class="suggestion-cards" id="suggestion-cards">
          <button class="suggestion-card" data-msg="Tell me a joke" id="sug-joke">
            <span class="suggestion-icon">😂</span>Tell me a joke
          </button>
          <button class="suggestion-card" data-msg="Give me a fun fact" id="sug-fact">
            <span class="suggestion-icon">💡</span>Give me a fun fact
          </button>
          <button class="suggestion-card" data-msg="What is AI?" id="sug-ai">
            <span class="suggestion-icon">🧠</span>What is AI?
          </button>
          <button class="suggestion-card" data-msg="What can you do?" id="sug-help">
            <span class="suggestion-icon">🤖</span>What can you do?
          </button>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div class="typing-indicator" id="typing-indicator">
        <div class="avatar bot-avatar">N</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-area-inner">
          <!-- File Preview -->
          <div class="file-preview-area" id="file-preview-area">
            <div class="file-chip" id="file-chip">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
              <span id="file-chip-name">file.jpg</span>
              <button class="file-chip-remove" id="file-remove-btn" title="Remove">×</button>
            </div>
          </div>
          <div class="input-wrapper">
            <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp,.txt,.md,.json,.csv,.py,.js,.ts,.html,.css,.xml,.yaml,.sql" hidden/>
            <button class="attach-btn" id="attach-btn" title="Attach file (image or text)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <button class="mic-btn" id="mic-btn" title="Use Microphone">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
            </button>
            <textarea
              id="user-input"
              placeholder="Ask NovaMind anything…"
              rows="1"
              autocomplete="off"
              spellcheck="true"
            ></textarea>
            <button class="send-btn" id="send-btn" disabled>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22,2 15,22 11,13 2,9"/>
              </svg>
            </button>
          </div>
          <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line · drag &amp; drop files</p>
        </div>
      </div>

    </main>
  </div>

  <script src="config.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
